<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - ACV Asset Management</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
</head>

<body class="auth-wrapper">

    <div class="auth-card">
        <div class="logo">
            <img th:src="@{/static/images/acv_logo.png}" alt="ACV Logo">
        </div>

        <h3 style="text-align: center; margin-bottom: 20px; color: #333;">Đăng nhập hệ thống</h3>

        <form th:action="@{/login}" method="post">
            <div th:if="${param.error}" style="color: red; margin-bottom: 15px; font-size: 14px; text-align: center;">
                Tài khoản hoặc mật khẩu không chính xác.
            </div>

            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn-primary">Đăng nhập</button>
        </form>

        <div class="auth-links">
            <a th:href="@{/forgot-password}">Quên mật khẩu?</a>
        </div>
    </div>

</body>

</html>
