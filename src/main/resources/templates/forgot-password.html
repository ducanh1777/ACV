<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - ACV Asset Management</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
</head>

<body class="auth-wrapper">

    <div class="auth-card">
        <div class="logo">
            <img th:src="@{/static/images/acv_logo.png}" alt="ACV Logo">
        </div>

        <h3 style="text-align: center; margin-bottom: 20px; color: #333;">Khôi phục mật khẩu</h3>
        <p style="text-align: center; color: #666; font-size: 14px; margin-bottom: 25px;">Vui lòng liên hệ với Quản trị
            viên (Admin) hoặc gửi yêu cầu qua Gmail để được cấp lại mật khẩu.</p>

        <form action="#">
            <div class="form-group">
                <label for="email">Nhập Gmail của bạn</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="example@acv.vn" required>
            </div>

            <button type="button" class="btn-primary"
                onclick="alert('Yêu cầu đã được gửi đến Admin. Vui lòng kiểm tra Gmail sau 5-10 phút.')">Gửi yêu
                cầu</button>
        </form>

        <div class="auth-links">
            <a th:href="@{/login}">Quay lại đăng nhập</a>
        </div>
    </div>

</body>

</html>
