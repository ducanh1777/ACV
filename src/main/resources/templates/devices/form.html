<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{layout :: head}"></div>
</head>

<body>
    <div th:replace="~{layout :: sidebar}"></div>
    <div class="main-wrapper">
        <div th:replace="~{layout :: top-bar}"></div>

        <div class="content-body" th:fragment="content">
            <div class="breadcrumb" style="margin-bottom: 16px; font-size: 13px; color: var(--text-muted);">
                <a th:href="@{/devices}" style="color: var(--brand-primary); text-decoration: none;">Danh sách thiết
                    bị</a>
                <i class="fas fa-chevron-right" style="font-size: 10px; margin: 0 8px;"></i>
                <span th:text="${title}">Thêm thiết bị mới</span>
            </div>

            <div
                style="background: white; padding: 40px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: var(--card-shadow); max-width: 1000px; margin: 0 auto;">
                <h2 style="font-size: 22px; font-weight: 700; margin: 0 0 30px 0; padding-bottom: 15px; border-bottom: 2px solid var(--bg-main); color: #1e293b;"
                    th:text="${title}">Thêm thiết bị mới</h2>

                <form th:action="@{/devices/save}" th:object="${device}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                        <div class="form-group">
                            <label
                                style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Tên
                                thiết bị <span style="color: var(--danger-text);">*</span></label>
                            <input type="text" th:field="*{name}" required placeholder="Vd: Laptop Dell Latitude 5420"
                                class="form-input"
                                style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-main);">
                        </div>

                        <div class="form-group">
                            <label
                                style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Mã
                                tài sản <span style="color: var(--danger-text);">*</span></label>
                            <input type="text" th:field="*{assetCode}" required placeholder="Vd: ACV-LT-2024-001"
                                class="form-input"
                                style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-main);">
                        </div>

                        <div class="form-group">
                            <label
                                style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Số
                                Serial</label>
                            <input type="text" th:field="*{serialNumber}" placeholder="Nhập số Serial nhà sản xuất"
                                class="form-input"
                                style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-main);">
                        </div>

                        <div class="form-group">
                            <label
                                style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Loại
                                thiết bị</label>
                            <input type="text" th:field="*{type}" placeholder="Vd: Laptop, PC, Máy in..."
                                class="form-input"
                                style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-main);">
                        </div>

                        <div class="form-group">
                            <label
                                style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Số
                                lượng <span style="color: var(--danger-text);">*</span></label>
                            <input type="number" th:field="*{quantity}" required min="1" step="1" class="form-input"
                                style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-main);"
                                onfocus="this.select()">
                            <small
                                style="color: var(--text-muted); font-size: 11px; margin-top: 4px; display: block;">Có
                                thể gõ số trực tiếp.</small>
                        </div>

                        <div class="form-group">
                            <label
                                style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Trạng
                                thái</label>
                            <select th:field="*{status}" class="form-input"
                                style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-main); cursor: pointer; appearance: auto;">
                                <option value="DEPLOYED">Sử dụng</option>
                                <option value="BACKUP">Dự phòng</option>
                                <option value="IN_STOCK">Tồn kho</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label
                                style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Vị
                                trí</label>
                            <input type="text" th:field="*{location}" placeholder="Vd: AOCC, Quầy J13"
                                class="form-input"
                                style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-main);">
                        </div>

                        <div class="form-group">
                            <label
                                style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Người
                                sử dụng</label>
                            <input type="text" th:field="*{assignedTo}" placeholder="Tên nhân viên đang giữ thiết bị"
                                class="form-input"
                                style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-main);">
                        </div>

                        <div class="form-group">
                            <label
                                style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Nhà
                                Ga (Terminal)</label>
                            <input type="text" th:field="*{terminal}" placeholder="Vd: T1, T2" class="form-input"
                                style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-main);">
                        </div>

                        <div class="form-group">
                            <label
                                style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Hệ
                                thống (System)</label>
                            <input type="text" th:field="*{deviceSystem}" placeholder="Vd: FIDS, SCN" class="form-input"
                                style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-main);">
                        </div>

                        <div class="form-group">
                            <label
                                style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Ngày
                                mua</label>
                            <input type="date" th:field="*{purchaseDate}" class="form-input"
                                style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-main);">
                        </div>
                    </div>

                    <div style="margin-top: 25px;">
                        <label
                            style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Ghi
                            chú chi tiết</label>
                        <textarea th:field="*{notes}" placeholder="Cấu hình chi tiết, tình trạng hiện tại..."
                            style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-main); min-height: 100px; resize: vertical;"></textarea>
                    </div>

                    <div
                        style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 30px; padding-top: 25px; border-top: 1px solid var(--border-color);">
                        <a th:href="@{/devices}"
                            style="padding: 12px 24px; border-radius: 8px; text-decoration: none; color: #64748b; background: #f1f5f9; font-weight: 600; transition: all 0.2s;">Hủy</a>
                        <button type="submit"
                            style="padding: 12px 32px; border-radius: 8px; border: none; background: var(--brand-primary); color: white; font-weight: 600; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(124, 77, 255, 0.4); transition: all 0.2s;">Lưu
                            thông tin</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:replace="~{layout :: footer}"></div>
    </div>
</body>

</html>
