<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{layout :: head}"></div>
</head>

<body>
    <div th:replace="~{layout :: sidebar}"></div>
    <div class="main-wrapper">
        <div th:replace="~{layout :: top-bar}"></div>

        <style>
            .form-container {
                background: white;
                padding: 50px;
                border-radius: 20px;
                border: 1px solid #e5e7eb;
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
                max-width: 950px;
                margin: 20px auto;
            }

            .form-title {
                margin-bottom: 40px;
                font-weight: 800;
                color: #111827;
                font-size: 28px;
                border-bottom: 2px solid #f3f4f6;
                padding-bottom: 15px;
            }

            .form-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 40px 50px;
                /* Increased row and column gap */
            }

            .form-field {
                margin-bottom: 10px;
            }

            .form-label {
                display: block;
                margin-bottom: 12px;
                font-weight: 600;
                color: #374151;
                font-size: 15px;
            }

            .form-input {
                width: 100%;
                padding: 14px 16px;
                border: 2px solid #f3f4f6;
                border-radius: 12px;
                font-size: 16px;
                outline: none;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                background: #f9fafb;
                box-sizing: border-box;
            }

            .form-input:focus {
                border-color: #6a1b9a;
                background: white;
                box-shadow: 0 0 0 4px rgba(106, 27, 154, 0.15);
            }

            .form-textarea {
                width: 100%;
                padding: 16px;
                border: 2px solid #f3f4f6;
                border-radius: 12px;
                font-size: 16px;
                resize: vertical;
                outline: none;
                transition: all 0.3s;
                background: #f9fafb;
                min-height: 120px;
                box-sizing: border-box;
            }

            .form-textarea:focus {
                border-color: #6a1b9a;
                background: white;
                box-shadow: 0 0 0 4px rgba(106, 27, 154, 0.15);
            }

            .form-actions {
                display: flex;
                justify-content: flex-end;
                gap: 20px;
                padding-top: 30px;
                margin-top: 20px;
                border-top: 2px solid #f3f4f6;
            }

            .btn-cancel {
                padding: 14px 28px;
                border-radius: 12px;
                text-decoration: none;
                color: #4b5563;
                background: #f3f4f6;
                font-weight: 700;
                font-size: 16px;
                transition: all 0.2s;
            }

            .btn-cancel:hover {
                background: #e5e7eb;
                color: #1f2937;
            }

            .btn-submit {
                padding: 14px 40px;
                border-radius: 12px;
                border: none;
                background: linear-gradient(135deg, #6a1b9a 0%, #4a148c 100%);
                color: white;
                font-weight: 700;
                font-size: 16px;
                cursor: pointer;
                transition: all 0.3s;
                box-shadow: 0 4px 6px -1px rgba(106, 27, 154, 0.3);
            }

            .btn-submit:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 15px -3px rgba(106, 27, 154, 0.4);
                filter: brightness(1.1);
            }
        </style>

        <div class="content-body" th:fragment="content">
            <!-- DEBUG: VERSION 2.0 - SPACED LAYOUT -->
            <div class="form-container">
                <h2 class="form-title" th:text="${title}">Thêm thiết bị mới</h2>

                <form th:action="@{/devices/save}" th:object="${device}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-grid">
                        <div class="form-field">
                            <label class="form-label">Tên thiết bị <span style="color: #ef4444;">*</span></label>
                            <input type="text" th:field="*{name}" required placeholder="Vd: Laptop Dell Latitude 5420"
                                class="form-input">
                        </div>

                        <div class="form-field">
                            <label class="form-label">Mã tài sản <span style="color: #ef4444;">*</span></label>
                            <input type="text" th:field="*{assetCode}" required placeholder="Vd: ACV-LT-2024-001"
                                class="form-input">
                        </div>

                        <div class="form-field">
                            <label class="form-label">Số Serial</label>
                            <input type="text" th:field="*{serialNumber}" placeholder="Nhập số Serial nhà sản xuất"
                                class="form-input">
                        </div>

                        <div class="form-field">
                            <label class="form-label">Loại thiết bị</label>
                            <input type="text" th:field="*{type}" placeholder="Vd: Laptop, PC, Máy in..."
                                class="form-input">
                        </div>

                        <div class="form-field">
                            <label class="form-label">Trạng thái</label>
                            <select th:field="*{status}" class="form-input" style="cursor: pointer; appearance: auto;">
                                <option value="DEPLOYED">Đang triển khai</option>
                                <option value="BACKUP">Dự phòng</option>
                                <option value="IN_STOCK">Tồn kho (Trong kho)</option>
                            </select>
                        </div>

                        <div class="form-field">
                            <label class="form-label">Vị trí</label>
                            <input type="text" th:field="*{location}" placeholder="Vd: Phòng Kỹ thuật, Tầng 3"
                                class="form-input">
                        </div>

                        <div class="form-field">
                            <label class="form-label">Người sử dụng</label>
                            <input type="text" th:field="*{assignedTo}" placeholder="Tên nhân viên đang giữ thiết bị"
                                class="form-input">
                        </div>

                        <div class="form-field">
                            <label class="form-label">Ngày mua</label>
                            <input type="date" th:field="*{purchaseDate}" class="form-input">
                        </div>
                    </div>

                    <div style="margin-top: 30px;">
                        <label class="form-label">Ghi chú chi tiết</label>
                        <textarea th:field="*{notes}" placeholder="Cấu hình chi tiết, tình trạng hiện tại..."
                            class="form-textarea"></textarea>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/devices}" class="btn-cancel">Quay lại</a>
                        <button type="submit" class="btn-submit">Lưu thông tin thiết bị</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:replace="~{layout :: footer}"></div>
    </div>
</body>

</html>
