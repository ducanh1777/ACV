<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <div th:replace="~{layout :: head}"></div>
    <style>
        .table-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #eee;
            overflow: hidden;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th {
            background: #f8f9fa;
            padding: 15px 20px;
            text-align: left;
            font-weight: 600;
            color: #666;
            font-size: 13px;
            border-bottom: 2px solid #eee;
        }

        .table td {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            color: #333;
        }

        .role-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .role-admin {
            background: #fee2e2;
            color: #991b1b;
        }

        .role-manager {
            background: #fef3c7;
            color: #92400e;
        }

        .role-employee {
            background: #dcfce7;
            color: #166534;
        }
    </style>
</head>

<body>
    <div th:replace="~{layout :: sidebar}"></div>
    <div class="main-wrapper">
        <div th:replace="~{layout :: top-bar}"></div>
        <div class="content-body">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <div>
                    <h2 style="color: #6a1b9a; margin: 0;">Danh sách nhân viên</h2>
                    <p style="color: #777; margin: 5px 0 0;">Quản lý tài khoản hệ thống ACV</p>
                </div>
                <a th:href="@{/admin/register-employee}" class="btn-primary"
                    style="text-decoration: none; padding: 10px 20px;">
                    <i class="fas fa-user-plus"></i> Thêm nhân viên mới
                </a>
            </div>

            <div th:if="${param.success}"
                style="background: #dcfce7; color: #166534; padding: 15px; border-radius: 8px; margin-bottom: 25px; font-weight: 500;">
                <i class="fas fa-check-circle"></i> Nhân viên mới đã được tạo và lưu vào hệ thống!
            </div>

            <div class="table-card">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên đăng nhập</th>
                            <th>Gmail</th>
                            <th>Vai trò</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">1</td>
                            <td style="font-weight: 600;" th:text="${user.username}">admin</td>
                            <td th:text="${user.email}">admin@acv.vn</td>
                            <td>
                                <span th:each="role : ${user.roles}"
                                    th:class="'role-badge ' + ${role == T(com.acv.assetmanagement.model.Role).ROLE_ADMIN ? 'role-admin' : (role == T(com.acv.assetmanagement.model.Role).ROLE_MANAGER ? 'role-manager' : 'role-employee')}"
                                    th:text="${role}">ROLE_ADMIN</span>
                            </td>
                            <td>
                                <button class="btn-primary"
                                    style="padding: 5px 12px; font-size: 12px; background: transparent; border: 1px solid #ddd; color: #666;"><i
                                        class="fas fa-edit"></i> Sửa</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div th:replace="~{layout :: footer}"></div>
    </div>
</body>

</html>
