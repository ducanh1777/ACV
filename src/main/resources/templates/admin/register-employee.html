<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <div th:replace="~{layout :: head}"></div>
</head>

<body>
    <div th:replace="~{layout :: sidebar}"></div>
    <div class="main-wrapper">
        <div th:replace="~{layout :: top-bar}"></div>
        <div class="content-body">
            <div
                style="background: white; padding: 40px; border-radius: 12px; border: 1px solid #eee; max-width: 600px; margin: 0 auto;">
                <h2 style="color: #6a1b9a; margin-bottom: 20px;">Đăng ký nhân viên mới</h2>
                <p style="color: #666; margin-bottom: 30px;">Nhập thông tin nhân viên để tạo tài khoản hệ thống.</p>

                <div th:if="${success}"
                    style="background: #dcfce7; color: #166534; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: 500;">
                    <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
                </div>

                <div th:if="${error}"
                    style="background: #fef2f2; color: #991b1b; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: 500;">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
                </div>

                <form th:action="@{/admin/register-employee}" method="post">
                    <div class="form-group">
                        <label for="username">Tên đăng nhập</label>
                        <input type="text" id="username" name="username" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Gmail nhân viên</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu ban đầu</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="role">Vai trò</label>
                        <select id="role" name="role" class="form-control" required>
                            <option value="ROLE_EMPLOYEE">Nhân viên (Employee)</option>
                            <option value="ROLE_MANAGER">Quản lý (Manager)</option>
                            <option value="ROLE_ADMIN">Quản trị viên (Admin)</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary" style="margin-top: 10px;">Tạo tài khoản</button>
                </form>
            </div>
        </div>
        <div th:replace="~{layout :: footer}"></div>
    </div>
</body>

</html>
