<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">ACV Asset Management</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
</head>

<body>

    <div class="sidebar" th:fragment="sidebar">
        <div class="logo-container">
            <img th:src="@{/static/images/acv_logo.png}" alt="ACV Logo" style="max-height: 48px;">
        </div>

        <ul class="sidebar-menu">
            <li th:classappend="${currentUri == '/' ? 'active' : ''}">
                <a th:href="@{/}"><i class="fas fa-home"></i> Dashboards <i class="fas fa-chevron-down"
                        style="margin-left: auto; font-size: 10px;"></i></a>
            </li>

            <li class="open">
                <div class="menu-header">
                    <i class="far fa-lightbulb"></i>
                    <span>Ứng dụng</span>
                    <i class="fas fa-chevron-up toggle-icon" style="margin-left: auto; font-size: 10px;"></i>
                </div>
                <ul class="submenu" style="max-height: 2000px;">
                    <li><a href="#"><i class="fas fa-plus" style="font-size: 10px;"></i> Giao nhận ca điện tử</a></li>
                    <li>
                        <a href="#"><i class="fas fa-plus" style="font-size: 10px;"></i> Checklist & Bảo trì <i
                                class="fas fa-chevron-down" style="margin-left: auto; font-size: 10px;"></i></a>
                    </li>
                    <li class="active">
                        <a th:href="@{/devices}"><i class="fas fa-plus" style="font-size: 10px;"></i> Quản lý thiết
                            bị</a>
                    </li>
                    <li><a href="#"><i class="fas fa-plus" style="font-size: 10px;"></i> Dự án & công trình</a></li>
                    <li>
                        <a href="#"><i class="fas fa-plus" style="font-size: 10px;"></i> KPI <i
                                class="fas fa-chevron-down" style="margin-left: auto; font-size: 10px;"></i></a>
                    </li>
                    <li><a href="#"><i class="fas fa-plus" style="font-size: 10px;"></i> Lịch trực</a></li>
                    <li><a href="#"><i class="fas fa-plus" style="font-size: 10px;"></i> Huấn luyện đào tạo (n/a)</a>
                    </li>
                    <li><a href="#"><i class="fas fa-plus" style="font-size: 10px;"></i> Chats (n/a)</a></li>
                </ul>
            </li>

            <li>
                <div class="menu-header">
                    <i class="far fa-user"></i>
                    <span>Quản trị</span>
                    <i class="fas fa-chevron-down toggle-icon" style="margin-left: auto; font-size: 10px;"></i>
                </div>
            </li>
            <li><a href="#"><i class="fas fa-map-marked-alt"></i> Map (n/a)</a></li>
            <li>
                <a href="#"><i class="fas fa-plane"></i> Hoạt động bay <i class="fas fa-chevron-down"
                        style="margin-left: auto; font-size: 10px;"></i></a>
            </li>
        </ul>
    </div>

    <div class="main-wrapper">
        <div class="top-bar" th:fragment="top-bar">
            <div style="display: flex; align-items: center; gap: 24px;">
                <i class="fas fa-bars" style="color: #64748b; cursor: pointer; font-size: 18px;"></i>
                <div class="search-input-group">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search anything here...">
                </div>
            </div>

            <div style="display: flex; align-items: center; gap: 24px;">
                <i class="far fa-moon" style="color: #64748b; cursor: pointer; font-size: 18px;"></i>
                <i class="far fa-bell" style="color: #64748b; cursor: pointer; font-size: 18px;"></i>
                <i class="fas fa-expand" style="color: #64748b; cursor: pointer; font-size: 18px;"></i>
                <div style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=f1f5f9&color=64748b" alt="User"
                        style="width: 36px; height: 36px; border-radius: 8px; border: 1px solid #e2e8f0;">
                </div>
                <i class="fas fa-cog" style="color: #64748b; cursor: pointer; font-size: 18px;"></i>
            </div>
        </div>

        <!-- Global Messages -->
        <div style="padding: 24px 24px 0 24px;"
            th:if="${param.success != null or success != null or param.error != null or error != null}">
            <div th:if="${param.success != null or success != null}"
                style="padding: 12px 16px; border-radius: 8px; background-color: var(--success-bg); color: var(--success-text); border: 1px solid #d1fae5; display: flex; align-items: center; gap: 10px; font-size: 14px;">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success ?: (param.success != null ? 'Thao tác thành công!' : '')}"></span>
            </div>
            <div th:if="${param.error != null or error != null}"
                style="padding: 12px 16px; border-radius: 8px; background-color: var(--danger-bg); color: var(--danger-text); border: 1px solid #fee2e2; display: flex; align-items: center; gap: 10px; font-size: 14px;">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error ?: (param.error != null ? param.error[0] : '')}"></span>
            </div>
        </div>

        <div class="content-body" th:fragment="content">
            <!-- Content will be injected here -->
        </div>

        <footer th:fragment="footer"
            style="padding: 24px; text-align: center; color: var(--text-muted); font-size: 12px; background: white; border-top: 1px solid var(--border-color);">
            Copyright © 2026 TIA. All rights reserved.
        </footer>
    </div>

</body>

</html>
