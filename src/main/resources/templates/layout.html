<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">ACV Asset Management</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
</head>

<body>

    <div class="sidebar" th:fragment="sidebar">
        <div class="logo-container">
            <img th:src="@{/static/images/acv_logo.png}" alt="ACV Logo">
        </div>

        <ul class="sidebar-menu">
            <li th:classappend="${#httpServletRequest.requestURI == '/' ? 'active' : ''}">
                <a th:href="@{/}" style="color: white; text-decoration: none;"><i class="fas fa-th-large"></i> Bảng điều
                    khiển</a>
            </li>
            <li><i class="fas fa-exchange-alt"></i> Giao nhận ca điện tử</li>
            <li><i class="fas fa-tools"></i> Quản lý thiết bị</li>
        </ul>

        <div class="sidebar-section-title"> Quản trị hệ thống</div>
        <ul class="sidebar-menu">
            <li sec:authorize="hasRole('ROLE_ADMIN')"
                th:classappend="${#httpServletRequest.requestURI.contains('/admin/employees') ? 'active' : ''}">
                <a th:href="@{/admin/employees}" style="color: white; text-decoration: none;"><i
                        class="fas fa-users"></i> Danh sách nhân viên</a>
            </li>
            <li sec:authorize="hasRole('ROLE_ADMIN')"
                th:classappend="${#httpServletRequest.requestURI.contains('/admin/register-employee') ? 'active' : ''}">
                <a th:href="@{/admin/register-employee}" style="color: white; text-decoration: none;"><i
                        class="fas fa-user-plus"></i> Đăng ký nhân viên</a>
            </li>
        </ul>

        <ul class="sidebar-menu" style="margin-top: auto; padding-bottom: 20px;">
            <li><a th:href="@{/logout}" style="color: white; text-decoration: none;"><i class="fas fa-sign-out-alt"></i>
                    Đăng xuất</a></li>
        </ul>
    </div>

    <div class="main-wrapper">
        <div class="top-bar" th:fragment="top-bar">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Tìm kiếm...">
            </div>
            <div class="top-bar-icons">
                <i class="far fa-bell"></i>
                <div class="user-profile"
                    style="background: #f8f9fa; padding: 5px 15px; border-radius: 20px; border: 1px solid #eee;">
                    <span sec:authentication="name" style="font-weight: 600; color: #6a1b9a;">User</span>
                </div>
                <a th:href="@{/logout}" title="Đăng xuất" style="color: #ef4444; font-size: 18px; margin-left: 10px;">
                    <i class="fas fa-power-off"></i> <span style="font-size: 14px; font-weight: 600;">Đăng xuất</span>
                </a>
            </div>
        </div>

        <div class="content-body" th:fragment="content">
            <!-- Content will be injected here -->
        </div>

        <footer th:fragment="footer">
            Bản quyền © 2026 TIA. Đã đăng ký Bản quyền.
        </footer>
    </div>

</body>

</html>
