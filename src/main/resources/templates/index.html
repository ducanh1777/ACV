<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{layout :: head}"></div>
</head>

<body>
    <div th:replace="~{layout :: sidebar}"></div>
    <div class="main-wrapper">
        <div th:replace="~{layout :: top-bar}"></div>
        <div class="content-body" th:fragment="content">
            <div style="background: white; padding: 40px; border-radius: 12px; border: 1px solid #eee;">
                <h2>Chào mừng quay trở lại, <span sec:authentication="name">User</span>!</h2>
                <p style="color: #666; margin-top: 10px;">Đây là hệ thống quản lý tài sản của Tổng công ty Cảng hàng
                    không Việt Nam (ACV).</p>

                <div
                    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px;">
                    <div
                        style="background: #fdf2f8; padding: 20px; border-radius: 10px; border-left: 5px solid #ab47bc;">
                        <h4 style="color: #6a1b9a;">Tổng tài sản</h4>
                        <p style="font-size: 24px; font-weight: bold; margin-top: 10px;">1,280</p>
                    </div>
                    <div
                        style="background: #f0fdf4; padding: 20px; border-radius: 10px; border-left: 5px solid #22c55e;">
                        <h4 style="color: #166534;">Đang hoạt động</h4>
                        <p style="font-size: 24px; font-weight: bold; margin-top: 10px;">1,245</p>
                    </div>
                    <div
                        style="background: #fef2f2; padding: 20px; border-radius: 10px; border-left: 5px solid #ef4444;">
                        <h4 style="color: #991b1b;">Cần bảo trì</h4>
                        <p style="font-size: 24px; font-weight: bold; margin-top: 10px;">35</p>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="~{layout :: footer}"></div>
    </div>
</body>

</html>
