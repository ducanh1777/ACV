<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Bảng điều khiển - ACV Asset Management</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --acv-purple-gradient: linear-gradient(180deg, #6a1b9a 0%, #ab47bc 100%);
            --acv-sidebar-width: 260px;
            --acv-bg-light: #f8f9fa;
            --acv-white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--acv-bg-light);
            margin: 0;
        }

        .sidebar {
            width: var(--acv-sidebar-width);
            height: 100vh;
            background: var(--acv-purple-gradient);
            position: fixed;
            top: 0;
            left: 0;
            color: white;
            padding-top: 20px;
            z-index: 1000;
        }

        .sidebar .logo-container {
            padding: 0 20px 30px;
            text-align: center;
        }

        .sidebar .logo-container img {
            max-width: 100%;
            height: auto;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-menu li {
            padding: 12px 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
        }

        .sidebar-menu li i {
            margin-right: 15px;
            width: 20px;
            text-align: center;
        }

        .sidebar-menu li.active {
            background: rgba(255, 255, 255, 0.15);
            font-weight: 600;
        }

        .sidebar-section-title {
            padding: 20px 20px 10px;
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.7;
            font-weight: bold;
        }

        .main-wrapper {
            margin-left: var(--acv-sidebar-width);
            min-height: 100vh;
        }

        .top-bar {
            height: 60px;
            background: var(--acv-white);
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #f1f3f4;
            padding: 8px 15px;
            border-radius: 8px;
            width: 350px;
        }

        .search-bar input {
            border: none;
            background: transparent;
            outline: none;
            margin-left: 10px;
            width: 100%;
        }

        .top-bar-icons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-profile img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .content-body {
            padding: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 25px;
        }

        .stat-card {
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid;
        }

        footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #888;
            border-top: 1px solid #eee;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo-container">
            <img src="C:/Users/ducanh/.gemini/antigravity/brain/7698eea9-52b8-4086-94e0-7103528dcb67/acv_logo_mockup_1773118938607.png"
                alt="ACV Logo">
        </div>
        <ul class="sidebar-menu">
            <li class="active"><i class="fas fa-th-large"></i> Bảng điều khiển</li>
            <li><i class="fas fa-exchange-alt"></i> Giao nhận ca điện tử</li>
            <li><i class="fas fa-tools"></i> Quản lý thiết bị</li>
            <li><i class="fas fa-chart-line"></i> KPI (n/a)</li>
        </ul>
        <div class="sidebar-section-title"> Quản trị</div>
        <ul class="sidebar-menu">
            <li><i class="fas fa-user-plus"></i> Đăng ký nhân viên</li>
            <li><i class="fas fa-user-shield"></i> Phân quyền</li>
        </ul>
    </div>
    <div class="main-wrapper">
        <div class="top-bar">
            <div class="search-bar"><i class="fas fa-search"></i><input type="text" placeholder="Tìm kiếm..."></div>
            <div class="top-bar-icons">
                <i class="far fa-bell"></i>
                <div class="user-profile"><span>Admin</span><img src="https://ui-avatars.com/api/?name=Admin"
                        alt="User"></div>
            </div>
        </div>
        <div class="content-body">
            <div class="card">
                <h2>Chào mừng quay trở lại, Admin!</h2>
                <div class="stats-grid">
                    <div class="stat-card" style="background: #fdf2f8; border-color: #ab47bc;">
                        <h4 style="color: #6a1b9a; margin: 0;">Tổng tài sản</h4>
                        <p style="font-size: 28px; font-weight: bold; margin: 10px 0 0;">1,280</p>
                    </div>
                    <div class="stat-card" style="background: #f0fdf4; border-color: #22c55e;">
                        <h4 style="color: #166534; margin: 0;">Đang hoạt động</h4>
                        <p style="font-size: 28px; font-weight: bold; margin: 10px 0 0;">1,245</p>
                    </div>
                    <div class="stat-card" style="background: #fef2f2; border-color: #ef4444;">
                        <h4 style="color: #991b1b; margin: 0;">Cần bảo trì</h4>
                        <p style="font-size: 28px; font-weight: bold; margin: 10px 0 0;">35</p>
                    </div>
                </div>
            </div>
        </div>
        <footer>Bản quyền © 2026 TIA. Đã đăng ký Bản quyền.</footer>
    </div>
</body>

</html>
